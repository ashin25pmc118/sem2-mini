{% extends "base.html" %}
{% block title %}Delete Supplier — Bakery Mate{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>Delete Supplier</h2>
    </div>
</div>
<div class="card" style="max-width:480px;">
    <div class="alert alert-danger" style="margin-bottom:20px;">⚠️ Delete <strong>{{ supplier.name }}</strong>? This
        cannot be undone.</div>
    <form method="post" style="display:flex;gap:10px;">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">🗑️ Yes, Delete</button>
        <a class="btn btn-secondary" href="{% url 'supplier_list' %}">Cancel</a>
    </form>
</div>
{% endblock %}

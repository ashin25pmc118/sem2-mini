{% extends "base.html" %}
{% block title %}{{ action }} Expense — ManageNest{% endblock %}
{% block nav_expenses %}active{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>{{ action }} Expense</h2>
        <p>Record money spent on shop operations.</p>
    </div>
</div>

<div class="card" style="max-width:600px;">
    <form method="post">
        {% csrf_token %}
        <div style="display:grid; grid-template-columns: 1fr; gap: 15px;">
            {{ form.as_p }}
        </div>
        <div style="display:flex;gap:12px;margin-top:20px;">
            <button class="btn btn-primary" type="submit">💾 Save Expense</button>
            <a class="btn btn-secondary" href="{% url 'expense_list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

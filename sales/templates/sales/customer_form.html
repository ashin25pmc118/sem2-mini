{% extends "base.html" %}
{% block title %}{{ action }} Customer — ManageNest{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h2>{{ action }} Customer</h2>
        <p>{% if action == "Edit" %}Update customer details.{% else %}Register a new customer profile.{% endif %}</p>
    </div>
</div>
<div class="card" style="max-width:520px;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display:flex;gap:10px;margin-top:8px;">
            <button class="btn btn-primary" type="submit">💾 Save Customer</button>
            <a class="btn btn-secondary" href="{% url 'customer_list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

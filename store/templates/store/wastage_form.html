{% extends "base.html" %}
{% block title %}{{ action }} Wastage — ManageNest{% endblock %}
{% block nav_stock %}active{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h3 style="margin-top:0; margin-bottom: 20px;">{{ action }}</h3>
    
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Product (optional)</label>
            <select name="{{ form.product.name }}" class="form-control" id="{{ form.product.id_for_label }}">
                {% for value, text in form.product.field.choices %}
                    <option value="{{ value }}" {% if form.product.value|stringformat:"s" == value|stringformat:"s" %}selected{% endif %}>{{ text }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Raw Material (optional)</label>
            <select name="{{ form.inventory_item.name }}" class="form-control" id="{{ form.inventory_item.id_for_label }}">
                {% for value, text in form.inventory_item.field.choices %}
                    <option value="{{ value }}" {% if form.inventory_item.value|stringformat:"s" == value|stringformat:"s" %}selected{% endif %}>{{ text }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Batch (optional)</label>
            <select name="{{ form.batch.name }}" class="form-control" id="{{ form.batch.id_for_label }}">
                {% for value, text in form.batch.field.choices %}
                    <option value="{{ value }}" {% if form.batch.value|stringformat:"s" == value|stringformat:"s" %}selected{% endif %}>{{ text }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Quantity Wasted</label>
            <input type="number" step="0.01" name="{{ form.quantity.name }}" class="form-control" value="{{ form.quantity.value|default_if_none:'' }}" required id="{{ form.quantity.id_for_label }}">
        </div>
        <div class="form-group">
            <label>Reason</label>
            <textarea name="{{ form.reason.name }}" class="form-control" rows="3" required id="{{ form.reason.id_for_label }}">{{ form.reason.value|default_if_none:'' }}</textarea>
        </div>
        
        <div style="margin-top: 20px;">
            <button type="submit" class="btn btn-primary">Save Log</button>
            <a href="{% url 'wastage_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

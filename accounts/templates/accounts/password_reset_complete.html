{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete — Bakery Mate</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; height: 100vh; display: flex; background: #faf7f2; justify-content: center; align-items: center; }
        .login-form-box { width: 100%; max-width: 400px; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .login-form-box h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #1a1a1a; margin-bottom: 16px; }
        .login-form-box p { color: #555; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.5; }
        .btn-login { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, #e8902e, #c8843a); color: white; font-size: 0.95rem; font-weight: 600; text-decoration: none; border-radius: 8px; transition: transform 0.15s; }
    </style>
</head>
<body>
    <div class="login-form-box">
        <h1>Password Reset Complete</h1>
        <p>Your password has been successfully reset. You may go ahead and log in now.</p>
        <a href="{% url 'login' %}" class="btn-login">Log In</a>
    </div>
</body>
</html>
